# A2C (synchronous advantage actor-critic) on DroneDispatch-v0 (Role B)
# Run: python code/role_b/train_a2c.py --config configs/a2c.yaml --seed 0

env:
  H: 20
  W: 20
  T_max: 500
  n_drones: 8
  k_max: 20
  lam: 0.3
  sla_steps: 60
  neighborhood: 4
  e_move: 0.01
  e_idle: 0.001
  c_rate: 0.05
  charge_threshold: 0.30
  n_nofly: 24
  n_hubs: 4
  init_soc: 1.0
  reward:
    r_delivered: 10.0
    r_ontime_bonus: 5.0
    r_late_penalty: -0.1
    r_dropped: -15.0
    r_energy: -1.0
    r_depletion: -50.0
    r_noop: -0.01

# --- algorithm ---
lr: 0.0007
gamma: 0.99
gae_lambda: 0.95
ent_coef: 0.01
vf_coef: 0.5
hidden: 64
max_grad_norm: 0.5
norm_adv: true
reward_scale: 0.1
n_steps: 32
total_steps: 100000
eval_every_updates: 200
val_seeds: [200, 201, 202]
