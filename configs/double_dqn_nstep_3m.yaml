# 3M escalation of the best/only-improving 600k method (Double DQN n=3).
# Tests whether the damping stabilization continues toward greedy_nearest=4.57
# or diverges like the prior plain-DQN 3M run. Validated base, seed 0.
env_config: configs/eval_standard.yaml
seed: 0
total_steps: 3000000
max_steps_per_episode: 1000
buffer_size: 100000
batch_size: 128
gamma: 0.99
learning_rate: 0.0001
reward_scale: 10.0
normalize_time: true
n_step: 3
hidden_sizes:
- 256
- 256
learning_starts: 1000
train_every: 4
target_update_every: 1000
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay_steps: 40000
double_dqn: true
dueling: false
eval_every: 50000
eval_seeds:
- 0
- 1
- 2
log_path: logs/double_dqn_nstep_3m.csv
eval_log_path: logs/double_dqn_nstep_3m_eval.csv
weight_path: weights/double_dqn_nstep_3m.pt
checkpoint_interval: 250000
